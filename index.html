<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0F172A;
            --btn-blue: #38BDF8;
            --card-dark: #1E293B;
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
            --lock-color: #334155;
        }

        body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .view-section { display: none; height: calc(100vh - 70px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Elements */
        .main-btn { background-color: var(--btn-blue); color: white; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; border: none; width: 100%; border-radius: 18px; margin-bottom: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .main-btn:active { transform: scale(0.95); }
        .locked { background-color: var(--lock-color) !important; opacity: 0.6; }
        
        .back-btn { color: var(--btn-blue); background: none; border: 1px solid var(--btn-blue); padding: 8px 15px; border-radius: 10px; margin-bottom: 20px; cursor: pointer; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .choice-card { background: var(--card-dark); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid #334155; cursor: pointer; font-weight: bold; }
        .choice-card:active { transform: scale(0.95); background: #2d3a4f; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card-dark); display: flex; border-top: 1px solid #334155; }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; }
        .tab-item.active { border-bottom: 3px solid var(--btn-blue); background: #ffffff05; }
    </style>
</head>
<body>

    <div id="learn-view" class="view-section active">
        <div id="subjects-list"></div>
    </div>

    <div id="chapter-view" class="view-section">
        <button class="back-btn" onclick="showView('learn-view')">← ရှေ့သို့</button>
        <h2 id="subj-title">Subject</h2>
        <div id="chapters-grid" class="grid-container"></div>
    </div>

    <div id="mode-view" class="view-section">
        <button class="back-btn" onclick="showView('chapter-view')">← ရှေ့သို့</button>
        <h2 id="mode-title">ရွေးချယ်ပါ</h2>
        <div class="grid-container">
            <div class="choice-card" onclick="selectType('Quiz')">📝 Quiz</div>
            <div class="choice-card" onclick="selectType('Flashcards')">🗂️ Flashcards</div>
        </div>
    </div>

    <div id="sub-type-view" class="view-section">
        <button class="back-btn" onclick="showView('mode-view')">← ရှေ့သို့</button>
        <h2 id="type-title">အမျိုးအစားရွေးပါ</h2>
        <div id="sub-type-grid" class="grid-container"></div>
    </div>

    <div id="profile-view" class="view-section">
        <div style="text-align:center; padding-top:40px;">
            <div id="user-name" style="font-size:2rem; font-weight:bold;">Scholar</div>
            <div id="purchased-count" style="margin:20px; color:var(--text-dim);">0 ဝယ်ယူပြီး</div>
            <a href="https://t.me/thearkot" style="display:block; background:var(--btn-blue); color:white; padding:15px; margin:10px; border-radius:15px; text-decoration:none;">ဝယ်ယူရန်</a>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('learn', this)">🏠</div>
        <div class="tab-item" onclick="switchTab('profile', this)">👤</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const userDatabase = { "8432363664": ["မြန်မာစာ", "အင်္ဂလိပ်စာ", "ဓာတုဗေဒ", "ရူပဗေဒ"] };
        const currentUserId = tg.initDataUnsafe?.user?.id?.toString() || "guest";
        const purchasedSubjects = userDatabase[currentUserId] || [];

        let currentSubject = "";
        let currentChapter = "";

        const subjectData = {
            "မြန်မာစာ": { list: ["အပြော", "စကားပြေ", "ကဗျာ", "ရေသည်", "အဖတ်"] },
            "အင်္ဂလိပ်စာ": { list: ["Unit 1","Unit 2","Unit 3","Unit 4","Unit 5","Unit 6","Unit 7","Unit 8","Unit 9","Unit 10","Unit 11","Unit 12","Poem 1","Poem 2","Poem 3","Poem 4"] },
            "ဓာတုဗေဒ": { count: 8 },
            "ရူပဗေဒ": { count: 13 },
            "ဘောဂဗေဒ": { count: 8 },
            "ဇီဝဗေဒ": { count: 6 }
        };

        const listContainer = document.getElementById('subjects-list');
        Object.keys(subjectData).forEach(sub => {
            const isPurchased = purchasedSubjects.includes(sub);
            const btn = document.createElement('button');
            btn.className = `main-btn ${!isPurchased ? 'locked' : ''}`;
            btn.innerHTML = `<span>${sub} ${!isPurchased ? '🔒' : ''}</span><span>→</span>`;
            btn.onclick = () => {
                if(!isPurchased) return tg.showAlert("ဝယ်ယူရန်လိုအပ်ပါသည်။");
                openSubject(sub);
            };
            listContainer.appendChild(btn);
        });

        function openSubject(sub) {
            currentSubject = sub;
            document.getElementById('subj-title').innerText = sub;
            const grid = document.getElementById('chapters-grid');
            grid.innerHTML = '';
            const data = subjectData[sub];
            if(data.list) data.list.forEach(item => createChapBtn(item));
            else for(let i=1; i<=data.count; i++) createChapBtn(`Chapter ${i}`);
            showView('chapter-view');
        }

        function createChapBtn(name) {
            const div = document.createElement('div');
            div.className = 'choice-card';
            div.innerText = name;
            div.onclick = () => { currentChapter = name; showView('mode-view'); };
            document.getElementById('chapters-grid').appendChild(div);
        }

        function selectType(type) {
            const grid = document.getElementById('sub-type-grid');
            grid.innerHTML = '';
            document.getElementById('type-title').innerText = `${type} အမျိုးအစား`;

            if (type === "Quiz") {
                if (currentSubject === "အင်္ဂလိပ်စာ") {
                    ["Initial Letter", "MCQ", "Grammar"].forEach(t => createTypeBtn(t));
                } else {
                    ["True or False", "Fill in the Blank", "MCQ"].forEach(t => createTypeBtn(t));
                }
            } else { // Flashcards
                if (currentSubject === "အင်္ဂလိပ်စာ") {
                    createTypeBtn("Q&A");
                } else if (currentSubject === "ရူပဗေဒ") {
                    ["Definition", "Derivation"].forEach(t => createTypeBtn(t));
                } else {
                    createTypeBtn("Definition");
                }
            }
            showView('sub-type-view');
        }

        function createTypeBtn(name) {
            const div = document.createElement('div');
            div.className = 'choice-card';
            div.innerText = name;
            div.onclick = () => tg.showAlert(`${currentSubject} > ${currentChapter} > ${name} ကို မကြာမီတင်ပေးပါမည်။`);
            document.getElementById('sub-type-grid').appendChild(div);
        }

        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function switchTab(viewId, el) {
            showView(viewId + '-view');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Scholar";
        document.getElementById('purchased-count').innerText = `${purchasedSubjects.length} ဝယ်ယူပြီး`;
    </script>
</body>
</html>
