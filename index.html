<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0F172A;
            --btn-blue: #38BDF8;
            --nav-bg: #1E293B;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- SCROLLABLE LIST --- */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* --- SUBJECT BUTTONS --- */
        .subject-container {
            margin-bottom: 12px;
            border-radius: 20px;
            overflow: hidden;
        }

        .subject-header {
            background-color: var(--btn-blue);
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 20px;
            transition: border-radius 0.3s;
        }

        .subject-header.open {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .arrow {
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid white;
            transition: transform 0.3s;
        }

        .arrow.up { transform: rotate(180deg); }

        /* --- EXPANDABLE OPTIONS --- */
        .options-drawer {
            display: none;
            background-color: #ffffff;
            padding: 10px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .option-btn {
            background-color: var(--btn-blue);
            color: white;
            margin: 5px 0;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            width: 100%;
            display: block;
        }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #334155;
        }

        .nav-item {
            font-size: 2rem;
            color: white;
            opacity: 0.7;
            cursor: pointer;
            padding: 10px 20px;
        }

        .nav-item.active {
            opacity: 1;
            background-color: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="content-area">
        <div class="subject-container">
            <div class="subject-header" onclick="toggleSubject(this)">
                <span>မြန်မာစာ</span>
                <div class="arrow"></div>
            </div>
            <div class="options-drawer">
                <button class="option-btn" onclick="startActivity('quiz', 'Myanmar')">ဉာဏ်စမ်းမေးခွန်းများ</button>
                <button class="option-btn" onclick="startActivity('flash', 'Myanmar')">Flashcards</button>
            </div>
        </div>

        <div class="subject-container">
            <div class="subject-header" onclick="toggleSubject(this)">
                <span>အင်္ဂလိပ်စာ</span>
                <div class="arrow"></div>
            </div>
            <div class="options-drawer">
                <button class="option-btn" onclick="startActivity('quiz', 'English')">Quiz</button>
                <button class="option-btn" onclick="startActivity('flash', 'English')">Flashcards</button>
            </div>
        </div>

        <div class="subject-container">
            <div class="subject-header" onclick="toggleSubject(this)">
                <span>ဇီဝဗေဒ</span>
                <div class="arrow"></div>
            </div>
            <div class="options-drawer">
                <button class="option-btn" onclick="startActivity('quiz', 'Biology')">Quiz</button>
                <button class="option-btn" onclick="startActivity('flash', 'Biology')">Flashcards</button>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">❓</div>
        <div class="nav-item">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function toggleSubject(header) {
            const drawer = header.nextElementSibling;
            const arrow = header.querySelector('.arrow');
            
            // Toggle visibility
            if (drawer.style.display === "block") {
                drawer.style.display = "none";
                header.classList.remove('open');
                arrow.classList.remove('up');
            } else {
                drawer.style.display = "block";
                header.classList.add('open');
                arrow.classList.add('up');
            }

            // Haptic Feedback for a premium feel
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function startActivity(type, subject) {
            tg.showAlert(`Starting ${type} for ${subject}`);
            // Later we will build the actual quiz pages here!
        }
    </script>
</body>
</html>
