<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0F172A;
            --card-dark: #1E293B;
            --accent: #38BDF8;
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevents bouncing on mobile */
        }

        /* --- VIEWS --- */
        .view-section {
            display: none;
            padding: 20px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }
        .active { display: block; }

        /* --- LOBBY/QUIZ UI --- */
        .locked-card {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px dashed var(--text-dim);
        }

        .action-btn {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* --- PROFILE UI --- */
        .profile-header {
            text-align: center;
            padding: 30px 0;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        /* --- BOTTOM TABS --- */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: var(--card-dark);
            display: flex;
            border-top: 1px solid #334155;
        }
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            cursor: pointer;
        }
        .tab-item.active { color: var(--accent); }

    </style>
</head>
<body>

    <div id="quiz-view" class="view-section active">
        <h2>Learning Center</h2>
        <div id="access-container">
            <p>Checking permissions...</p>
        </div>
    </div>

    <div id="middle-view" class="view-section">
        <h2>Coming Soon</h2>
        <p style="color: var(--text-dim)">This section is currently empty.</p>
    </div>

    <div id="profile-view" class="view-section">
        <div class="profile-header">
            <div class="avatar" id="user-initials">?</div>
            <h3 id="user-full-name">User Name</h3>
            <p id="user-id-display" style="font-size: 0.8rem; color: var(--text-dim)"></p>
        </div>
        
        <div style="background: var(--card-dark); border-radius: 10px; padding: 10px;">
            <div style="padding: 10px; border-bottom: 1px solid #334155;">Settings</div>
            <div style="padding: 10px; border-bottom: 1px solid #334155;">Language: English</div>
            <div style="padding: 10px;">Notifications: On</div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="showSection('quiz', this)">📖<br>Learn</div>
        <div class="tab-item" onclick="showSection('middle', this)">⏳<br>Soon</div>
        <div class="tab-item" onclick="showSection('profile', this)">👤<br>Profile</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 1. YOUR VIP LIST
        // Put your own Telegram ID here, and any friends you want to allow.
        // To find your ID, message @userinfobot on Telegram.
        const allowedUsers = [8432363664]; 

        const userId = tg.initDataUnsafe?.user?.id;
        const firstName = tg.initDataUnsafe?.user?.first_name || "Scholar";
        
        // Setup Profile View
        document.getElementById('user-full-name').innerText = firstName;
        document.getElementById('user-initials').innerText = firstName.charAt(0);
        document.getElementById('user-id-display').innerText = "ID: " + (userId || "Unknown");

        // 2. CHECK ACCESS
        const accessContainer = document.getElementById('access-container');
        if (allowedUsers.includes(userId)) {
            accessContainer.innerHTML = `
                <div class="locked-card" style="border-style: solid; border-color: var(--accent)">
                    <p>✅ Access Granted!</p>
                    <button class="action-btn">Start Quiz</button>
                    <button class="action-btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent)">Flashcards</button>
                </div>
            `;
        } else {
            accessContainer.innerHTML = `
                <div class="locked-card">
                    <p>🔒 This section is locked.</p>
                    <p style="font-size: 0.8rem; color: var(--text-dim)">Only authorized students can access lessons.</p>
                </div>
            `;
        }

        // 3. NAVIGATION LOGIC
        function showSection(id, element) {
            // Hide all sections
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            // Show target section
            document.getElementById(id + '-view').classList.add('active');
            
            // Update tab styling
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }
    </script>
</body>
</html>
