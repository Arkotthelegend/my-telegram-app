<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { 
            --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; 
            --white: #ffffff; --lock: #475569; --success: #10B981; --error: #EF4444;
            --secondary-btn: #334155;
        }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { padding: 15px; flex: 1; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .subject-card { background: var(--accent); padding: 20px; border-radius: 18px; margin-bottom: 12px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: white; }
        .locked { background: var(--lock) !important; opacity: 0.6; }
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin: 8px 0; cursor: pointer; text-align: center; box-sizing: border-box; font-size: 1rem; -webkit-tap-highlight-color: transparent; text-decoration: none; display: block; }
        .back-btn { background: var(--secondary-btn); margin-top: 20px; }
        .next-btn { background: var(--success); display: none; margin-top: 10px; }
        .option-btn { background: var(--card); border: 2px solid #334155; transition: 0.2s; color: white; }
        .correct-opt { background: var(--success) !important; border-color: var(--success) !important; }
        .wrong-opt { background: var(--error) !important; border-color: var(--error) !important; }
        .math-ans-box { background: #0F172A; border: 2px dashed var(--accent); padding: 15px; border-radius: 12px; margin-top: 15px; display: none; text-align: center; font-size: 1.1rem; color: var(--success); }
        .flash-container { perspective: 1000px; height: 320px; cursor: pointer; margin: 20px 0; }
        .flash-card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; }
        .flash-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; border-radius: 20px; padding: 25px; text-align: center; box-sizing: border-box; border: 3px solid var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .flash-front { background: var(--card); color: var(--white); }
        .flash-back { background: var(--accent); color: white; transform: rotateY(180deg); font-size: 1.1rem; }
        .is-flipped { transform: rotateY(180deg); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { font-size: 1.8rem; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .profile-header { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .bought-badge { background: #0EA5E9; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin: 5px; display: inline-block; }
        .switch-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-screen" class="screen active-screen">
            <h2 style="text-align: center; color: var(--accent);">ဘာသာရပ်များ</h2>
            <div id="subject-list"></div>
        </div>

        <div id="middle-screen" class="screen">
            <div style="height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <h2 style="color: var(--accent);">The Arkot</h2>
                <p style="color: #94A3B8;">Digital Education for Everyone</p>
            </div>
        </div>

        <div id="profile-screen" class="screen">
            <div class="profile-header">
                <div class="avatar" id="user-avatar">👨‍🎓</div>
                <h2 id="user-name" style="margin: 0;">Scholar</h2>
                <p id="user-id-text" style="color: #94A3B8; margin: 5px 0;"></p>
                <div class="switch-container">
                    <span>👨</span>
                    <input type="checkbox" id="gender-switch" onchange="updateAvatar()">
                    <span>👩</span>
                </div>
            </div>
            <div style="background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
                <h3 style="margin-top: 0; font-size: 1rem; color: var(--accent);">ဝယ်ယူထားသော ဘာသာရပ်များ</h3>
                <div id="bought-items-container"></div>
            </div>
            <a href="https://t.me/Arkot_Admin" class="btn" style="background: #22C55E;">ဘာသာရပ်များ ဝယ်ယူရန်</a>
            <button class="btn back-btn" onclick="tg.close()">အက်ပ်မှထွက်မည်</button>
        </div>

        <div id="menu-screen" class="screen">
            <h2 id="menu-title" style="text-align: center; color: var(--accent);"></h2>
            <div id="menu-content"></div>
            <button class="btn back-btn" onclick="showScreen('home')">ပင်မစာမျက်နှာသို့</button>
        </div>

        <div id="activity-screen" class="screen">
            <h2 id="activity-title" style="text-align: center; color: var(--accent);"></h2>
            <div id="activity-content"></div>
            <button class="btn back-btn" id="activity-back-btn">နောက်သို့</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div id="quiz-progress" style="text-align: center; color: var(--accent); font-weight: bold; margin-bottom: 10px;"></div>
            <div id="question-box" style="font-size: 1.2rem; text-align: center; margin: 20px 0; line-height: 1.5; background: var(--card); padding: 20px; border-radius: 15px;"></div>
            <div id="math-problem-area">
                <button id="show-ans-btn" class="btn" onclick="revealMathAnswer()">အဖြေတိုက်မည်</button>
                <div id="math-answer-display" class="math-ans-box"></div>
            </div>
            <div id="mcq-area" style="display:none;">
                <div id="quiz-options"></div>
            </div>
            <button id="next-btn" class="btn next-btn" onclick="nextQuestion()">နောက်တစ်ပုဒ်သို့ ➔</button>
            <button class="btn back-btn" id="quiz-back-btn">ထွက်မည်</button>
        </div>

        <div id="flashcard-screen" class="screen">
            <h2 id="flash-title" style="text-align: center; color: var(--accent); margin-bottom: 5px;">Flashcard</h2>
            <p id="flash-count" style="text-align: center; color: #94A3B8; margin: 0;">1 / 1</p>
            <div class="flash-container" onclick="flipCard()">
                <div id="flash-card" class="flash-card">
                    <div class="flash-face flash-front" id="flash-front-content"></div>
                    <div class="flash-face flash-back" id="flash-back-content"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background: var(--secondary-btn);" onclick="prevFlash()">⬅️ ရှေ့သို့</button>
                <button class="btn" onclick="nextFlash()">နောက်သို့ ➡️</button>
            </div>
            <button class="btn back-btn" onclick="showScreen('activity')">ထွက်မည်</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item nav-active" onclick="changeTab('home', this)">🏠</div>
        <div class="nav-item" onclick="changeTab('middle', this)">❓</div>
        <div class="nav-item" onclick="changeTab('profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // ဝယ်ယူထားသော User ID များ
        const paidUsers = { 
            "8432363664": ["all"], 
            "1625758870": ["all"] 
        };

        const subjects = [
            { id: 'math', name: 'သင်္ချာ', chapters: 11 },
            { id: 'mm', name: 'မြန်မာစာ', chapters: 0 },
            { id: 'en', name: 'အင်္ဂလိပ်စာ', chapters: 0 },
            { id: 'phy', name: 'ရူပဗေဒ', chapters: 13 },
            { id: 'chem', name: 'ဓာတုဗေဒ', chapters: 8 },
            { id: 'bio', name: 'ဇီဝဗေဒ', chapters: 6 },
            { id: 'eco', name: 'ဘောဂဗေဒ', chapters: 8 }
        ];

        let currentSubject = null;
        let currentQuestions = [];
        let currentIdx = 0;
        let flashIdx = 0;
        let flashCards = [];
        let isAnswered = false;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        const userBought = paidUsers[userId] || [];

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            subjects.forEach(sub => {
                const isPaid = userBought.includes('all') || userBought.includes(sub.id);
                const div = document.createElement('div');
                div.className = `subject-card ${isPaid ? '' : 'locked'}`;
                div.innerHTML = `<span>${sub.name} ${isPaid ? '' : '🔒'}</span> <span>➔</span>`;
                div.onclick = () => isPaid ? openSubjectMenu(sub) : tg.showAlert("ဤဘာသာရပ်ကို ဝယ်ယူရန် လိုအပ်ပါသည်။");
                list.appendChild(div);
            });
        }

        function openSubjectMenu(sub) {
            currentSubject = sub;
            showScreen('menu');
            document.getElementById('menu-title').innerText = sub.name;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';
            for(let i=1; i<=sub.chapters; i++) {
                createBtn(`Chapter ${i}`, content, () => showActivities(sub.id, `Chapter ${i}`));
            }
        }

        function showActivities(subId, partName) {
            showScreen('activity');
            document.getElementById('activity-title').innerText = partName;
            const content = document.getElementById('activity-content');
            content.innerHTML = '';
            document.getElementById('activity-back-btn').onclick = () => showScreen('menu');
            
            let types = [];
            if(subId === 'math') types = ['1_Mark', '2_Marks', '3_Marks', '5_Marks'];
            else if(subId === 'phy' || subId === 'chem') types = ['True_False', 'Fill_Blank', 'MCQ', 'Definition', 'Formula'];
            else if(subId === 'bio' || subId === 'eco') types = ['True_False', 'Fill_Blank', 'MCQ', 'Definition'];
            else types = ['True_False', 'Fill_Blank', 'MCQ'];

            types.forEach(type => {
                createBtn(type.replace('_', ' '), content, () => {
                    if(type === 'Definition' || type === 'Formula') initFlashcards(`${subId}_${partName}_${type}`.replace(/ /g, "_"));
                    else initQuiz(`${subId}_${partName}_${type}`.replace(/ /g, "_"), type);
                });
            });
        }

        async function initFlashcards(fileName) {
            try {
                const res = await fetch(`./quizzes/${fileName}.json`);
                if(!res.ok) throw new Error();
                flashCards = await res.json();
                flashIdx = 0; showScreen('flashcard'); updateFlashUI();
            } catch (e) { tg.showAlert("ဖိုင်မတွေ့ပါ- " + fileName); }
        }

        function updateFlashUI() {
            document.getElementById('flash-card').classList.remove('is-flipped');
            document.getElementById('flash-front-content').innerText = flashCards[flashIdx].q;
            document.getElementById('flash-back-content').innerText = flashCards[flashIdx].a;
            document.getElementById('flash-count').innerText = `${flashIdx + 1} / ${flashCards.length}`;
            if (window.MathJax) MathJax.typesetPromise();
        }

        function flipCard() { document.getElementById('flash-card').classList.toggle('is-flipped'); }
        function nextFlash() { if (flashIdx < flashCards.length - 1) { flashIdx++; updateFlashUI(); } }
        function prevFlash() { if (flashIdx > 0) { flashIdx--; updateFlashUI(); } }

        async function initQuiz(fileName, type) {
            try {
                const res = await fetch(`./quizzes/${fileName}.json`);
                if(!res.ok) throw new Error();
                currentQuestions = await res.json();
                currentIdx = 0; showScreen('quiz'); loadQuestion(type);
            } catch (e) { tg.showAlert("ဖိုင်မတွေ့ပါ- " + fileName); }
        }

        function loadQuestion(type) {
            isAnswered = false;
            document.getElementById('next-btn').style.display = 'none';
            const q = currentQuestions[currentIdx];
            document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
            document.getElementById('question-box').innerHTML = q.q || q.question;

            if (type === '1_Mark' || q.type === 'mcq' || (q.a && q.a.length > 0)) {
                document.getElementById('mcq-area').style.display = 'block';
                document.getElementById('math-problem-area').style.display = 'none';
                renderMCQ(q);
            } else {
                document.getElementById('mcq-area').style.display = 'none';
                document.getElementById('math-problem-area').style.display = 'block';
                document.getElementById('show-ans-btn').style.display = 'block';
                document.getElementById('math-answer-display').style.display = 'none';
                document.getElementById('math-answer-display').innerHTML = "အဖြေမှန်မှာ: " + (q.c || q.answer);
            }
            if (window.MathJax) MathJax.typesetPromise();
        }

        function renderMCQ(q) {
            const optDiv = document.getElementById('quiz-options');
            optDiv.innerHTML = '';
            q.a.forEach((a, i) => {
                const btn = document.createElement('button');
                btn.className = 'btn option-btn';
                btn.innerText = a;
                btn.onclick = () => {
                    if(isAnswered) return; isAnswered = true;
                    if(i === q.c) btn.classList.add('correct-opt');
                    else {
                        btn.classList.add('wrong-opt');
                        optDiv.children[q.c].classList.add('correct-opt');
                    }
                    document.getElementById('next-btn').style.display = 'block';
                };
                optDiv.appendChild(btn);
            });
        }

        function revealMathAnswer() {
            isAnswered = true;
            document.getElementById('show-ans-btn').style.display = 'none';
            document.getElementById('math-answer-display').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
            if (window.MathJax) MathJax.typesetPromise();
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) loadQuestion();
            else showScreen('activity');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id + '-screen').classList.add('active-screen');
        }

        function changeTab(id, el) {
            showScreen(id);
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            if(id === 'home') renderSubjects();
            if(id === 'profile') renderProfileData();
        }

        function renderProfileData() {
            document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Scholar";
            document.getElementById('user-id-text').innerText = "ID: " + userId;
            const container = document.getElementById('bought-items-container');
            container.innerHTML = '';
            const bought = subjects.filter(s => userBought.includes('all') || userBought.includes(s.id));
            if(bought.length > 0) {
                bought.forEach(s => {
                    const span = document.createElement('span');
                    span.className = 'bought-badge';
                    span.innerText = s.name;
                    container.appendChild(span);
                });
            } else { container.innerText = 'ဝယ်ယူထားခြင်းမရှိသေးပါ'; }
        }

        function updateAvatar() {
            const isFemale = document.getElementById('gender-switch').checked;
            document.getElementById('user-avatar').innerText = isFemale ? "👩‍🎓" : "👨‍🎓";
            localStorage.setItem('userGender', isFemale ? 'female' : 'male');
        }

        function createBtn(txt, parent, act) {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = txt; b.onclick = act; parent.appendChild(b);
        }

        if(localStorage.getItem('userGender') === 'female') {
            document.getElementById('gender-switch').checked = true;
            updateAvatar();
        }
        renderSubjects();
    </script>
</body>
</html>
