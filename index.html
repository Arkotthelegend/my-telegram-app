<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { 
            --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; 
            --white: #ffffff; --lock: #475569; --success: #10B981; --error: #EF4444;
            --secondary-btn: #334155;
        }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { padding: 15px; flex: 1; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        .subject-card { background: var(--accent); padding: 20px; border-radius: 18px; margin-bottom: 12px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: white; }
        .locked { background: var(--lock); opacity: 0.6; }
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin: 8px 0; cursor: pointer; text-align: center; box-sizing: border-box; font-size: 1rem; -webkit-tap-highlight-color: transparent; }
        .back-btn { background: var(--secondary-btn); margin-top: 20px; }
        .next-btn { background: var(--success); display: none; margin-top: 10px; }
        .option-btn { background: var(--card); border: 2px solid #334155; transition: 0.2s; color: white; }
        .correct-opt { background: var(--success) !important; border-color: var(--success) !important; }
        .wrong-opt { background: var(--error) !important; border-color: var(--error) !important; }
        .flash-container { perspective: 1000px; height: 320px; cursor: pointer; margin: 20px 0; }
        .flash-card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; }
        .flash-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; border-radius: 20px; padding: 25px; text-align: center; box-sizing: border-box; border: 3px solid var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .flash-front { background: var(--card); color: var(--white); }
        .flash-back { background: var(--accent); color: white; transform: rotateY(180deg); font-size: 1.1rem; }
        .is-flipped { transform: rotateY(180deg); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { font-size: 1.8rem; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .quiz-input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--accent); background: var(--card); color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .poem-content { background: var(--card); padding: 20px; border-radius: 15px; line-height: 1.8; white-space: pre-line; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-screen" class="screen active-screen">
            <h2 style="text-align: center; color: var(--accent);">ဘာသာရပ်များ</h2>
            <div id="subject-list"></div>
        </div>
        <div id="middle-screen" class="screen">
            <div style="height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;">
                <h2 style="color: var(--accent);">The Arkot</h2>
                <p style="color: #94A3B8;">Digital Education for Everyone</p>
            </div>
        </div>
        <div id="profile-screen" class="screen">
            <div style="text-align: center;">
                <h2 id="user-name" style="margin: 10px 0 5px;">Scholar</h2>
                <p id="user-id-text" style="color: #94A3B8;"></p>
                <button class="btn back-btn" onclick="tg.close()">အက်ပ်မှထွက်မည်</button>
            </div>
        </div>
        <div id="menu-screen" class="screen">
            <h2 id="menu-title" style="text-align: center; color: var(--accent);"></h2>
            <div id="menu-content"></div>
            <button class="btn back-btn" onclick="showScreen('home')">ပင်မစာမျက်နှာသို့</button>
        </div>
        <div id="activity-screen" class="screen">
            <h2 id="activity-title" style="text-align: center; color: var(--accent);"></h2>
            <div id="activity-content"></div>
            <button class="btn back-btn" id="activity-back-btn">နောက်သို့</button>
        </div>
        <div id="quiz-screen" class="screen">
            <div id="quiz-progress" style="text-align: center; color: var(--accent); font-weight: bold; margin-bottom: 10px;"></div>
            <div id="question-box" style="font-size: 1.2rem; text-align: center; margin: 20px 0; line-height: 1.5;"></div>
            <div id="quiz-options"></div>
            <button id="next-btn" class="btn next-btn" onclick="nextQuestion()">နောက်တစ်ပုဒ်သို့ ➔</button>
            <button class="btn back-btn" id="quiz-back-btn">ထွက်မည်</button>
        </div>
        <div id="flashcard-screen" class="screen">
            <h2 id="flash-title" style="text-align: center; color: var(--accent); margin-bottom: 5px;">Flashcard</h2>
            <p id="flash-count" style="text-align: center; color: #94A3B8; margin: 0;">1 / 1</p>
            <div class="flash-container" onclick="flipCard()">
                <div id="flash-card" class="flash-card">
                    <div class="flash-face flash-front" id="flash-front-content"></div>
                    <div class="flash-face flash-back" id="flash-back-content"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background: var(--secondary-btn);" onclick="prevFlash()">⬅️ ရှေ့သို့</button>
                <button class="btn" onclick="nextFlash()">နောက်သို့ ➡️</button>
            </div>
            <button class="btn back-btn" onclick="showScreen('activity')">ထွက်မည်</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item nav-active" onclick="changeTab('home', this)">🏠</div>
        <div class="nav-item" onclick="changeTab('middle', this)">❓</div>
        <div class="nav-item" onclick="changeTab('profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const paidUsers = { "8432363664": ["all"], "1625758870": ["all"] };
        const subjects = [
            { id: 'mm', name: 'မြန်မာစာ' },
            { id: 'en', name: 'အင်္ဂလိပ်စာ' },
            { id: 'math', name: 'သင်္ချာ', chapters: 11 },
            { id: 'phy', name: 'ရူပဗေဒ', chapters: 13 },
            { id: 'chem', name: 'ဓာတုဗေဒ', chapters: 8 }
        ];

        let currentSubject = null;
        let currentQuestions = [];
        let currentIdx = 0;
        let flashIdx = 0;
        let flashCards = [];
        let isAnswered = false;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        const userBought = paidUsers[userId] || [];

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            subjects.forEach(sub => {
                const isPaid = userBought.includes('all') || userBought.includes(sub.id);
                const div = document.createElement('div');
                div.className = `subject-card ${isPaid ? '' : 'locked'}`;
                div.innerHTML = `<span>${sub.name} ${isPaid ? '' : '🔒'}</span> <span>➔</span>`;
                div.onclick = () => isPaid ? openSubjectMenu(sub) : tg.showAlert("ဝယ်ယူရန်လိုအပ်ပါသည်။");
                list.appendChild(div);
            });
        }

        function openSubjectMenu(sub) {
            currentSubject = sub;
            showScreen('menu');
            document.getElementById('menu-title').innerText = sub.name;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';

            if (sub.id === 'phy' || sub.id === 'chem') {
                for(let i=1; i<=sub.chapters; i++) {
                    createBtn(`Chapter ${i}`, content, () => showPhyChemActivities(sub.id, `Chapter ${i}`));
                }
            } else {
                for(let i=1; i<=sub.chapters; i++) {
                    createBtn(`Chapter ${i}`, content, () => showGeneralActivities(sub.id, `Chapter ${i}`));
                }
            }
        }

        function showPhyChemActivities(subId, partName) {
            showScreen('activity');
            document.getElementById('activity-title').innerText = partName;
            const content = document.getElementById('activity-content');
            content.innerHTML = '';
            document.getElementById('activity-back-btn').onclick = () => openSubjectMenu(currentSubject);
            ['True_False', 'Fill_Blank', 'MCQ', 'Definition', 'Formula'].forEach(type => {
                createBtn(type.replace('_', ' '), content, () => {
                    if(type === 'Definition' || type === 'Formula') initFlashcards(`${subId}_${partName}_${type}`.replace(/ /g, "_"));
                    else initQuiz(`${subId}_${partName}_${type}`.replace(/ /g, "_"));
                });
            });
        }

        function showGeneralActivities(subId, partName) {
            showScreen('activity');
            document.getElementById('activity-title').innerText = partName;
            const content = document.getElementById('activity-content');
            content.innerHTML = '';
            document.getElementById('activity-back-btn').onclick = () => openSubjectMenu(currentSubject);
            let types = subId === 'math' ? ['1_Mark', '2_Marks', '3_Marks', '5_Marks'] : ['True_False', 'Fill_Blank', 'MCQ'];
            types.forEach(type => {
                createBtn(type.replace('_', ' '), content, () => initQuiz(`${subId}_${partName}_${type}`.replace(/ /g, "_")));
            });
        }

        async function initQuiz(fileName) {
            try {
                const res = await fetch(`./quizzes/${fileName}.json`);
                if(!res.ok) throw new Error();
                currentQuestions = await res.json();
                currentIdx = 0; showScreen('quiz'); loadQuestion();
            } catch (e) { tg.showAlert("ဖိုင်မတွေ့ပါ- " + fileName); }
        }

        function loadQuestion() {
            isAnswered = false; document.getElementById('next-btn').style.display = 'none';
            const q = currentQuestions[currentIdx];
            const questionText = q.q || q.question || "No Question";
            document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
            document.getElementById('question-box').innerText = questionText;
            const optDiv = document.getElementById('quiz-options'); optDiv.innerHTML = '';

            if (q.type === 'blank' || !q.a) { // ၂ မှတ်တန်ကဲ့သို့ အဖြေတိုက်ရုံပုံစံ
                const input = document.createElement('input');
                input.className = 'quiz-input'; input.placeholder = "အဖြေကို စဉ်းစားထားပါ...";
                const sBtn = document.createElement('button');
                sBtn.className = 'btn'; sBtn.innerText = "အဖြေမှန်ကြည့်မည်";
                sBtn.onclick = () => {
                    if(isAnswered) return; isAnswered = true;
                    input.value = q.c || q.answer;
                    input.style.color = 'var(--success)';
                    document.getElementById('next-btn').style.display = 'block';
                    if (window.MathJax) MathJax.typesetPromise();
                };
                optDiv.append(input, sBtn);
            } else { // MCQ / True-False
                const opts = q.a || [];
                opts.forEach((a, i) => {
                    const btn = document.createElement('button'); btn.className = 'btn option-btn'; btn.innerText = a;
                    btn.onclick = () => {
                        if(isAnswered) return; isAnswered = true;
                        const correct = q.c;
                        document.querySelectorAll('.option-btn').forEach((b, idx) => {
                            if(idx === correct) b.classList.add('correct-opt');
                            else if(idx === i) b.classList.add('wrong-opt');
                        });
                        document.getElementById('next-btn').style.display = 'block';
                    };
                    optDiv.appendChild(btn);
                });
            }
            if (window.MathJax) MathJax.typesetPromise();
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) loadQuestion();
            else { tg.showAlert("ပြီးဆုံးပါပြီ။"); showScreen('activity'); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id + '-screen').classList.add('active-screen');
        }

        function changeTab(id, el) {
            showScreen(id);
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            if(id === 'home') renderSubjects();
        }

        function createBtn(txt, parent, act) {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = txt; b.onclick = act; parent.appendChild(b);
        }

        renderSubjects();
    </script>
</body>
</html>
