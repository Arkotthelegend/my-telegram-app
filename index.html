<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0F172A;
            --btn-blue: #38BDF8;
            --card-dark: #1E293B;
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
            --lock-color: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 0; overflow: hidden;
        }

        .view-section {
            display: none; height: calc(100vh - 70px);
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Subjects & Buttons */
        .subject-container { margin-bottom: 12px; border-radius: 18px; overflow: hidden; }
        
        .main-btn {
            background-color: var(--btn-blue); color: white;
            padding: 18px 25px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; font-size: 1.2rem; font-weight: bold;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none; border: none; width: 100%;
        }
        
        .main-btn:active { transform: scale(0.94); }
        .locked { background-color: var(--lock-color) !important; opacity: 0.6; }

        .back-btn {
            color: var(--btn-blue); background: none; border: 1px solid var(--btn-blue);
            padding: 8px 15px; border-radius: 10px; margin-bottom: 20px; cursor: pointer;
        }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .chapter-item {
            background: var(--card-dark); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid #334155; cursor: pointer;
            transition: 0.1s;
        }
        .chapter-item:active { transform: scale(0.95); background: #2d3a4f; }

        /* Navigation */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--card-dark); display: flex; border-top: 1px solid #334155;
        }
        .tab-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; cursor: pointer; }
        .tab-item.active { border-bottom: 3px solid var(--btn-blue); background: #ffffff05; }
    </style>
</head>
<body>

    <div id="learn-view" class="view-section active">
        <div id="subjects-list"></div>
    </div>

    <div id="chapter-view" class="view-section">
        <button class="back-btn" onclick="showView('learn-view')">← ရှေ့သို့ပြန်သွားမည်</button>
        <h2 id="selected-subject-name">Subject</h2>
        <p id="selection-type" style="color: var(--text-dim); margin-bottom: 20px;">တစ်ခုရွေးချယ်ပါ</p>
        <div id="chapters-grid" class="grid-container"></div>
    </div>

    <div id="profile-view" class="view-section">
        <div style="text-align:center; padding-top:40px;">
            <div id="user-name" style="font-size:2rem; font-weight:bold;">Scholar</div>
            <div id="purchased-count" style="margin:20px; color:var(--text-dim);">0 ဘာသာဝယ်ယူပြီး</div>
            <a href="https://t.me/thearkot" style="display:block; background:var(--btn-blue); color:white; padding:15px; margin:10px; border-radius:15px; text-decoration:none;">ဘာသာဝယ်ယူရန်</a>
        </div>
    </div>

    <div id="middle-view" class="view-section">
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-dim);">အာကုတ်မှပြုလုပ်ထားသည်</div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('learn', this)">🏠</div>
        <div class="tab-item" onclick="switchTab('middle', this)">❓</div>
        <div class="tab-item" onclick="switchTab('profile', this)">👤</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // --- DATABASE: ဒီနေရာမှာ ID နဲ့ ဝယ်ထားတဲ့ဘာသာရပ်တွေ ထည့်ရမှာပါ ---
        const userDatabase = {
            "8432363664": ["မြန်မာစာ", "အင်္ဂလိပ်စာ", "သင်္ချာ", "ဓာတုဗေဒ", "ရူပဗေဒ"] // သင့် ID အတွက် Bio, Eco လွဲပြီး ကျန်တာဖွင့်ထားပေးပါတယ်
        };

        const currentUserId = tg.initDataUnsafe?.user?.id?.toString() || "guest";
        const purchasedSubjects = userDatabase[currentUserId] || [];

        const subjectData = {
            "မြန်မာစာ": { type: "အပိုင်း", list: ["အပြော", "စကားပြေ", "ကဗျာ", "ရေသည်", "အဖတ်"] },
            "အင်္ဂလိပ်စာ": { type: "Unit/Poem", list: ["Unit 1", "Unit 2", "Unit 3", "Unit 4", "Unit 5", "Unit 6", "Unit 7", "Unit 8", "Unit 9", "Unit 10", "Unit 11", "Unit 12", "Poem 1", "Poem 2", "Poem 3", "Poem 4"] },
            "သင်္ချာ": { type: "Chapter", count: 11 },
            "ဓာတုဗေဒ": { type: "Chapter", count: 8 },
            "ရူပဗေဒ": { type: "Chapter", count: 13 },
            "ဘောဂဗေဒ": { type: "Chapter", count: 8 },
            "ဇီဝဗေဒ": { type: "Chapter", count: 6 }
        };

        // Render Subjects
        const listContainer = document.getElementById('subjects-list');
        Object.keys(subjectData).forEach(sub => {
            const isPurchased = purchasedSubjects.includes(sub);
            const div = document.createElement('div');
            div.className = 'subject-container';
            div.innerHTML = `<button class="main-btn ${!isPurchased ? 'locked' : ''}" onclick="selectSubject('${sub}', ${isPurchased})">
                <span>${sub} ${!isPurchased ? '🔒' : ''}</span><span>→</span>
            </button>`;
            listContainer.appendChild(div);
        });

        function selectSubject(sub, isPurchased) {
            if (!isPurchased) {
                tg.showPopup({ title: 'Access Locked', message: '@thearkot တွင် ဝယ်ယူပြီးမှသာ ဝင်ရောက်နိုင်ပါမည်။', buttons: [{text: 'OK', type: 'close'}]});
                return;
            }
            const data = subjectData[sub];
            document.getElementById('selected-subject-name').innerText = sub;
            document.getElementById('selection-type').innerText = `${data.type} ရွေးချယ်ပါ`;
            
            const grid = document.getElementById('chapters-grid');
            grid.innerHTML = '';

            if (data.list) {
                data.list.forEach(item => createBtn(item, sub));
            } else {
                for (let i = 1; i <= data.count; i++) { createBtn(`Chapter ${i}`, sub); }
            }
            showView('chapter-view');
        }

        function createBtn(label, sub) {
            const btn = document.createElement('div');
            btn.className = 'chapter-item';
            btn.innerText = label;
            btn.onclick = () => tg.showAlert(`${sub} - ${label} အတွက် Quiz များကို မကြာမီထည့်သွင်းပေးပါမည်။`);
            document.getElementById('chapters-grid').appendChild(btn);
        }

        function showView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function switchTab(viewId, el) {
            showView(viewId + '-view');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Scholar";
        document.getElementById('purchased-count').innerText = `${purchasedSubjects.length} ဘာသာဝယ်ယူပြီး`;
    </script>
</body>
</html>
