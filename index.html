<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; 
            --white: #ffffff; --lock: #475569; --success: #10B981;
        }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .container { padding: 15px; height: calc(100vh - 70px); overflow-y: auto; box-sizing: border-box; }
        .subject-card {
            background: var(--accent); padding: 20px; border-radius: 18px;
            margin-bottom: 12px; font-size: 1.2rem; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .locked { background: var(--lock); opacity: 0.6; }
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn { 
            background: var(--accent); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; width: 100%; margin: 8px 0; 
            cursor: pointer; text-decoration: none; display: block; text-align: center; box-sizing: border-box;
        }
        .back-btn { background: #334155; margin-top: 20px; }
        .profile-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .buy-btn { background: var(--success); margin: 15px auto 0 auto; width: 90%; }
        .quiz-input {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid var(--accent);
            background: var(--card); color: white; font-size: 1.1rem; margin-bottom: 10px; outline: none;
        }
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { font-size: 1.8rem; opacity: 0.4; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-screen" class="screen active-screen">
            <h2 style="text-align: center; color: var(--accent);">ဘာသာရပ်များ</h2>
            <div id="subject-list"></div>
        </div>

        <div id="menu-screen" class="screen">
            <h2 id="menu-title" style="text-align: center; color: var(--accent);">Menu</h2>
            <div id="menu-content"></div>
            <button class="btn back-btn" onclick="showScreen('home')">နောက်သို့</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span id="quiz-progress" style="color: var(--accent);">0/0</span>
                <span id="quiz-score" style="color: var(--success);">Score: 0</span>
            </div>
            <div id="question-box" style="font-size: 1.3rem; text-align: center; margin: 30px 0; line-height: 1.5;"></div>
            <div id="quiz-options"></div>
            <button class="btn back-btn" onclick="showScreen('home')">ထွက်မည်</button>
        </div>

        <div id="profile-screen" class="screen">
            <div style="text-align: center; padding: 20px 0;">
                <div style="width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--bg); font-weight: bold;" id="avatar">?</div>
                <h1 id="user-name">User</h1>
                <p id="user-id-text" style="color: #94A3B8;"></p>
                <div class="profile-card">
                    <div style="text-align: left; margin-bottom: 15px;">
                        <b>ဝယ်ယူပြီးသော ဘာသာရပ်များ:</b><br>
                        <span id="bought-items" style="color: var(--accent);">မရှိသေးပါ</span>
                    </div>
                    <a href="https://t.me/thearkot" target="_blank" class="btn buy-btn">ဘာသာရပ်ဝယ်ယူရန်</a>
                </div>
            </div>
        </div>

        <div id="middle-screen" class="screen">
            <div style="height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center;">
               <h2 style="color: var(--accent);">အာကုတ်မှပြုလုပ်ထားသည်</h2>
           </div>
       </div>
    </div>

    <div class="nav">
        <div class="nav-item nav-active" onclick="changeTab('home', this)">🏠</div>
        <div class="nav-item" onclick="changeTab('middle', this)">❓</div>
        <div class="nav-item" onclick="changeTab('profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const paidUsers = { "8432363664": ["mm", "en", "phy", "chem", "math"] };
        const subjects = [
            { id: 'mm', name: 'မြန်မာစာ', parts: ['အပြော', 'စကားပြေ', 'ကဗျာ', 'ရေသည်', 'အဖတ်'] },
            { id: 'en', name: 'အင်္ဂလိပ်စာ', units: 12, poems: 4 },
            { id: 'math', name: 'သင်္ချာ', chapters: 11 }, // Math added
            { id: 'phy', name: 'ရူပဗေဒ', chapters: 13 },
            { id: 'chem', name: 'ဓာတုဗေဒ', chapters: 8 },
            { id: 'eco', name: 'ဘောဂဗေဒ', chapters: 8 },
            { id: 'bio', name: 'ဇီဝဗေဒ', chapters: 6 }
        ];

        let currentQuestions = [];
        let currentIdx = 0;
        let score = 0;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        const userBought = paidUsers[userId] || [];

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            subjects.forEach(sub => {
                const isPaid = userBought.includes('all') || userBought.includes(sub.id);
                const div = document.createElement('div');
                div.className = `subject-card ${isPaid ? '' : 'locked'}`;
                div.innerHTML = `<span>${sub.name} ${isPaid ? '' : '🔒'}</span> <span>➔</span>`;
                div.onclick = () => isPaid ? openMenu(sub) : tg.showAlert("ဝယ်ယူရန်လိုအပ်ပါသည်။");
                list.appendChild(div);
            });
        }

        function openMenu(sub) {
            showScreen('menu');
            document.getElementById('menu-title').innerText = sub.name;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';
            
            if (sub.id === 'mm') {
                sub.parts.forEach(p => createBtn(p, content, () => showActivityOptions(sub.id, p)));
            } else if (sub.id === 'en') {
                for(let i=1; i<=sub.units; i++) createBtn(`Unit ${i}`, content, () => showActivityOptions(sub.id, `Unit ${i}`));
            } else {
                for(let i=1; i<=sub.chapters; i++) createBtn(`Chapter ${i}`, content, () => showActivityOptions(sub.id, `Chapter ${i}`));
            }
        }

        function showActivityOptions(subId, partName) {
            const content = document.getElementById('menu-content');
            content.innerHTML = `<h3 style="text-align:center">${partName}</h3>`;
            createBtn("Quiz", content, () => showQuizTypes(subId, partName));
            createBtn("Flashcards", content, () => tg.showAlert(partName + " Flashcards Coming Soon"));
        }

        function showQuizTypes(subId, partName) {
            const content = document.getElementById('menu-content');
            content.innerHTML = `<h3 style="text-align:center">${partName} Quiz</h3>`;
            
            let types = [];
            if (subId === 'math') {
                types = ['1_Mark', '2_Mark', '3_Mark', '5_Mark'];
            } else if (subId === 'mm') {
                types = ['မှား_မှန်', 'ကွက်လပ်ဖြည့်', 'အမှန်ရွေး'];
            } else if (subId === 'en') {
                types = ['Initial_Letter', 'MCQ', 'Grammar'];
            } else {
                types = ['True_False', 'Fill_Blank', 'MCQ'];
            }

            types.forEach(t => {
                const fileName = `${subId}_${partName}_${t}`.replace(/ /g, "_");
                createBtn(t.replace(/_/g, " "), content, () => initQuiz(fileName));
            });
        }

        async function initQuiz(fileName) {
            try {
                const res = await fetch(`./quizzes/${fileName}.json`);
                currentQuestions = await res.json();
                currentIdx = 0; score = 0;
                showScreen('quiz');
                loadQuestion();
            } catch (e) {
                tg.showAlert("File not found: " + fileName + ".json");
            }
        }

        function loadQuestion() {
            const q = currentQuestions[currentIdx];
            document.getElementById('quiz-progress').innerText = `${currentIdx + 1}/${currentQuestions.length}`;
            document.getElementById('quiz-score').innerText = `Score: ${score}`;
            document.getElementById('question-box').innerText = q.q;
            const optDiv = document.getElementById('quiz-options');
            optDiv.innerHTML = '';

            if (q.type === 'mcq') {
                q.a.forEach((a, i) => createBtn(a, optDiv, () => checkAns(i === q.c)));
            } else if (q.type === 'tf') {
                createBtn("TRUE / မှန်", optDiv, () => checkAns(q.c === true));
                createBtn("FALSE / မှား", optDiv, () => checkAns(q.c === false));
            } else if (q.type === 'blank') {
                const input = document.createElement('input');
                input.className = 'quiz-input'; input.placeholder = "Answer...";
                const sBtn = document.createElement('button');
                sBtn.className = 'btn'; sBtn.innerText = "Check Answer";
                sBtn.onclick = () => checkAns(input.value.trim().toLowerCase() === q.c.toString().toLowerCase());
                optDiv.append(input, sBtn);
            }
        }

        function checkAns(correct) {
            if (correct) { score++; tg.showAlert("✅ Correct!"); }
            else { tg.showAlert("❌ Incorrect!"); }
            currentIdx++;
            if (currentIdx < currentQuestions.length) loadQuestion();
            else { tg.showAlert(`Finished! Score: ${score}`); showScreen('home'); }
        }

        function createBtn(txt, parent, act) {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = txt; b.onclick = act;
            parent.appendChild(b);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id + '-screen').classList.add('active-screen');
        }

        function changeTab(id, el) {
            showScreen(id);
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            if(id === 'home') renderSubjects();
        }

        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Scholar";
        document.getElementById('user-id-text').innerText = "ID: " + userId;
        if (userBought.length > 0) {
            document.getElementById('bought-items').innerText = subjects.filter(s => userBought.includes(s.id)).map(s => s.name).join(', ');
        }
        renderSubjects();
    </script>
</body>
</html>
