    <style>
        :root { 
            --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; 
            --white: #ffffff; --lock: #475569; --success: #10B981; --error: #EF4444;
            --secondary-btn: #334155;
        }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { padding: 15px; flex: 1; overflow-y: auto; box-sizing: border-box; padding-bottom: 90px; }
        
        .subject-card { background: var(--accent); padding: 20px; border-radius: 18px; margin-bottom: 12px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: white; }
        .locked { background: var(--lock); opacity: 0.6; }
        
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin: 8px 0; cursor: pointer; text-align: center; box-sizing: border-box; font-size: 1rem; -webkit-tap-highlight-color: transparent; }
        .back-btn { background: var(--secondary-btn); margin-top: 20px; }
        .next-btn { background: var(--success); display: none; margin-top: 10px; }

        .option-btn { background: var(--card); border: 2px solid #334155; transition: 0.2s; color: white; }
        .correct-opt { background: var(--success) !important; border-color: var(--success) !important; }
        .wrong-opt { background: var(--error) !important; border-color: var(--error) !important; }

        /* Flashcard Styling */
        .flash-container { perspective: 1000px; height: 320px; cursor: pointer; margin: 20px 0; }
        .flash-card { width: 100%; height: 100%; position: relative; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; }
        .flash-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; border-radius: 20px; padding: 25px; text-align: center; box-sizing: border-box; border: 3px solid var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .flash-front { background: var(--card); color: var(--white); }
        .flash-back { background: var(--accent); color: white; transform: rotateY(180deg); font-size: 1.1rem; }
        .is-flipped { transform: rotateY(180deg); }

        #profile-avatar { width: 100px; height: 100px; margin: 0 auto; display: block; }
        .profile-info-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; margin-top: 15px; border: 1px solid #334155; }
        .bought-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 15px 0; }
        .bought-badge { background: rgba(56, 189, 248, 0.15); color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 0.85rem; border: 1px solid var(--accent); font-weight: bold; }
        .buy-btn { background: var(--success); text-decoration: none; display: block; margin-top: 10px; }
        
        .gender-container { margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 15px; font-weight: bold; }
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(30px); }

        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { font-size: 1.8rem; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-active { opacity: 1; color: var(--accent); transform: scale(1.1); }
        
        .quiz-input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--accent); background: var(--card); color: white; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .poem-content { background: var(--card); padding: 20px; border-radius: 15px; line-height: 1.8; white-space: pre-line; text-align: center; }
          /* Flashcard အတွင်းစာသားများ ရှင်းလင်းစေရန် */
.flash-face {
    display: flex;
    flex-direction: column; /* စာသားများကို အပေါ်အောက် စီရန် */
    align-items: center;
    justify-content: center;
    overflow-y: auto; /* စာသားရှည်လျှင် scroll ဆွဲနိုင်ရန် */
    word-break: break-word; /* စာလုံးများ ဘောင်ကျော်မသွားစေရန် */
    line-height: 1.6; /* စာကြောင်းအကွာအဝေး ညှိရန် */
}
/* အဖြေမှန် Outline */
.correct-answer {

}

/* အဖြေမှား Outline */
.wrong-answer {

}

/* "နောက်တစ်ပုဒ်သို့" ခလုတ်ကို "ထွက်မည်" ခလုတ်အတိုင်း အတိအကျညှိခြင်း */

    background: rgb(1, 167, 248) !important;
    color: white !important;
    border: 1px solid rgba(255, 255, 255, 0.1) !important;

}

		const ADMIN_ID = 8432363664;
		
		function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}
		
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const paidUsers = { 
            "8432363664": ["all"],
            "5593040432": ["all"],
            "6912601908": ["phy"],
            "1625758870": ["all"],
        };

        const subjects = [

        ];

   function renderSubjects() {
    const list = document.getElementById('subject-list');
    list.innerHTML = '';
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;
    const isSpecial = specialUsers.includes(userId);

    subjects.forEach(sub => {
        let isPaid = userBought.includes('all') || userBought.includes(sub.id);

        // Special User ဆိုလျှင် ၆ ဘာသာ ပွင့်ပေးမည်
        if (isSpecial) {
            const fiveSubjects = ['mm', 'en', 'math', 'phy', 'chem'];
            // ရှေ့ ၅ ဘာသာ (သို့မဟုတ်) Bio/Eco တစ်ခုခု ဖြစ်ပါက ပွင့်မည်
            if (fiveSubjects.includes(sub.id) || sub.id === 'bio' || sub.id === 'eco') {
                isPaid = true;
            }
        }

        const div = document.createElement('div');
        div.className = `subject-card ${isPaid ? '' : 'locked'} ${isSpecial && isPaid ? 'premium-card' : ''}`;
        div.innerHTML = `<span>${sub.name} ${isPaid ? '' : '🔒'}</span> <span>➔</span>`;
        
        div.onclick = () => isPaid ? openSubjectMenu(sub) : tg.showAlert("Special User များသာ အသုံးပြုနိုင်ပါသည်။");
        list.appendChild(div);
    });
}

// သော့ဖွင့်ပေးသည့် Function
function unlockCard(div, sub) {
    div.classList.remove('locked');
    const lockSpan = div.querySelector('.lock-icon');
    if (lockSpan) lockSpan.remove(); // သော့ပုံလေးကို ဖြုတ်လိုက်မည်
    div.onclick = () => openSubjectMenu(sub);
}

        function openSubjectMenu(sub) {
            const isPaid = userBought.includes('all') || userBought.includes(sub.id);
    
    // အကယ်၍ ဝယ်မထားဘဲ Menu ထဲရောက်နေလျှင် (Trial မဟုတ်လျှင်) ပြန်ထုတ်ရန်
    if (!isPaid) {
        tg.showAlert("တစ်ဘာသာလုံးကို‌လေ့ကျင့်ဖို့ ဒီဘာသာရပ်ကိုဝယ်ယူလိုက်ပါ");
        showScreen('home');
        return;
    }
            currentSubject = sub;
            showScreen('menu');
            document.getElementById('menu-title').innerText = sub.name;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';

            if (sub.id === 'en') {
                ['Initial Letter', 'MCQ', 'Grammar', 'Poem'].forEach(type => {
                    createBtn(type, content, () => {
                        if (type === 'Initial Letter' || type === 'MCQ') showENUnits(type);
                        else if (type === 'Grammar') showENGrammarOptions();
                        else if (type === 'Poem') showENPoemOptions();
                    });
                });
            } else if (sub.id === 'mm') {
                ['မှား/မှန်', 'ကွက်လပ်ဖြည့်', 'အမှန်ရွေး', 'ခက်ဆစ်', 'အလင်္ကာ'].forEach(m => {
                    createBtn(m, content, () => {
                        if (['မှား/မှန်', 'ကွက်လပ်ဖြည့်', 'အမှန်ရွေး'].includes(m)) showMMQuizOptions(m);
                        else showMMFlashcardOptions(m);

function updateCountdown() {
    const examDate = new Date("March 1, 2027 09:00:00").getTime();
 // စာမေးပွဲရက် သတ်မှတ်ချက်
    const now = new Date().getTime();
    const diff = examDate - now;

    if (diff <= 0) {
        document.getElementById('exam-countdown').innerHTML = "စာမေးပွဲရက်သို့ ရောက်ရှိပါပြီ";
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('exam-countdown').innerHTML = `
        <div class="countdown-unit">
            <span class="countdown-value">${d}</span>
            <span class="countdown-label">Days</span>
        </div>
        <div class="countdown-unit">

        <div class="countdown-unit">

            <span class="countdown-label">Mins</span>
        </div>
        <div class="countdown-unit">
            <span class="countdown-value">${s}</span>
            <span class="countdown-label">Secs</span>
        </div>
    `;
}

        let startTime = Date.now();
const STREAK_REQUIRED_MINUTES = 15;

function updateStreak() {
    const today = new Date().toLocaleDateString();
    
    // Telegram Cloud ကနေ Data ကို အရင်လှမ်းယူပါမယ်
    tg.CloudStorage.getItem('streakData', (err, value) => {
        let streakData = { lastDate: '', count: 0 };
        if (!err && value) {
            streakData = JSON.parse(value);
        }

        let sessionMinutes = Math.floor((Date.now() - startTime) / 60000);

        if (sessionMinutes >= STREAK_REQUIRED_MINUTES && streakData.lastDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toLocaleDateString();

            if (streakData.lastDate === yesterdayStr) {
                streakData.count++;
            } else {
                streakData.count = 1;
            }

            streakData.lastDate = today;

            // Telegram Cloud ပေါ်သို့ သိမ်းဆည်းခြင်း
            tg.CloudStorage.setItem('streakData', JSON.stringify(streakData), (err, success) => {
                if (success) renderStreakUI();
            });
        }
    });
}

function displayDailyQuote() {
    const today = new Date();
    // နေ့၊ လ၊ ခုနှစ်ကို ပေါင်းပြီး နံပါတ်တစ်ခုထုတ်ယူခြင်း (ဥပမာ - ၂၆၅၂၀၂၆)
    const daySeed = today.getDate() + (today.getMonth() + 1) * 100 + today.getFullYear();
    
    // နေ့ရက်အပေါ် မူတည်ပြီး array ထဲက quote တစ်ခုကို ပုံသေရွေးချယ်ခြင်း
    const quoteIdx = daySeed % quotes.length;
    document.getElementById('daily-quote').innerText = `"${quotes[quoteIdx]}"`;

function renderStreakUI() {
    tg.CloudStorage.getItem('streakData', (err, value) => {
        let streakData = { count: 0 };
        if (!err && value) {
            streakData = JSON.parse(value);
        }

        const icon = document.getElementById('streak-icon');
        const text = document.getElementById('streak-text');
        const countText = document.getElementById('streak-count');

        if (streakData.count >= 30) {
            icon.innerText = "💎";
            text.innerText = "Legendary Streak!";
        } else if (streakData.count >= 7) {
            icon.innerText = "🔥";
            text.innerText = "On Fire!";
        } else {
            icon.innerText = "🌑";
            text.innerText = "စာကြိုးစားဆဲ...";
        }
        countText.innerText = `Streak: ${streakData.count} Days`;
    });
}
// Developer ကို ဆက်သွယ်ရန် (Telegram သို့ တိုက်ရိုက်ပို့ပေးမည်)
function contactDeveloper() {
    const devUsername = "minaphayarkot"; // သင့် Telegram Username ပြောင်းပါ
    const message = encodeURIComponent("မေးခွန်းမှားနေတာ / ထပ်နေတာ / အဖြေမှားနေတာလေးပြောချင်လို့ပါ");
    window.open(`https://t.me/${devUsername}?text=${message}`, '_blank');
}

// ၁ မိနစ်တစ်ခါ Streak ပြည့်မပြည့် စစ်ပေးမည်
setInterval(updateStreak, 600);

// Admin က Update တင်လိုက်သည့်အခါ
function postAnnouncement() {
    const text = document.getElementById('announcement-text').value;
    if (!text) return tg.showAlert("စာသားထည့်ပါ");

    tg.CloudStorage.setItem('app_announcement', text, (err, success) => {
        if (success) {
            tg.showAlert("Announcement ကို Update လုပ်ပြီးပါပြီ။");
            loadAnnouncement(); // ကိုယ့်ဆီမှာပါ ချက်ချင်းပြရန်
        }
    });
}

// Home Screen ကိုဖွင့်တိုင်း စာသားကို လှမ်းယူပြသရန်
function loadAnnouncement() {
    tg.CloudStorage.getItem('app_announcement', (err, value) => {
        const announceDiv = document.getElementById('admin-announcement');
        if (!err && value && value.trim() !== "") {
            announceDiv.innerText = "📢 " + value;
            announceDiv.style.display = 'block';
        } else {
            announceDiv.style.display = 'none';
        }
    });
}

// Window load ဖြစ်တဲ့အခါ ခေါ်ပေးရန်
window.addEventListener('load', loadAnnouncement);
      
    </script>
