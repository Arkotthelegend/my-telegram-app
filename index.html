<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; 
            --white: #ffffff; --lock: #475569; --success: #10B981; --error: #EF4444;
            --secondary-btn: #334155;
        }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Container ကို စာရိုက်တဲ့အခါ keyboard နဲ့ မလွတ်မှာစိုးလို့ auto scroll ပေးထားပါတယ် */
        .container { padding: 15px; flex: 1; overflow-y: auto; box-sizing: border-box; padding-bottom: 80px; }
        
        .subject-card { background: var(--accent); padding: 20px; border-radius: 18px; margin-bottom: 12px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .locked { background: var(--lock); opacity: 0.6; }
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin: 8px 0; cursor: pointer; text-align: center; box-sizing: border-box; font-size: 1rem; -webkit-tap-highlight-color: transparent; }
        .back-btn { background: var(--secondary-btn); margin-top: 20px; }
        .next-btn { background: var(--secondary-btn); display: none; margin-top: 10px; border: 1px solid var(--accent); }

        .option-btn { background: var(--card); border: 2px solid #334155; transition: 0.2s; color: white; }
        .correct-opt { background: var(--success) !important; border-color: var(--success) !important; }
        .wrong-opt { background: var(--error) !important; border-color: var(--error) !important; }

        /* Input Box ကို စာရိုက်လို့ရအောင် ပြင်ဆင်ထားမှု */
        .quiz-input { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            border: 2px solid var(--accent); 
            background: var(--card); 
            color: white; 
            margin-bottom: 10px; 
            box-sizing: border-box; 
            font-size: 1.1rem;
            outline: none;
        }
        .quiz-input:focus { border-color: var(--success); background: #26334d; }

        .check-btn { background: var(--success); }

        /* Navigation Bar */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { font-size: 1.8rem; opacity: 0.4; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--accent); }

        /* Profile & Avatar */
        #profile-avatar { width: 100px; height: 100px; margin: 0 auto; display: block; }
        .profile-info-card { background: var(--card); padding: 20px; border-radius: 15px; text-align: center; margin-top: 15px; }
        .buy-btn { background: var(--success); margin-top: 15px; text-decoration: none; display: block; }
        .gender-container { margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .switch { position: relative; display: inline-block; width: 60px; height: 34px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-screen" class="screen active-screen">
            <h2 style="text-align: center; color: var(--accent);">ဘာသာရပ်များ</h2>
            <div id="subject-list"></div>
        </div>

        <div id="middle-screen" class="screen">
            <div style="height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <h2 style="color: var(--accent);">အာကုတ်မှပြုလုပ်ထားသည်</h2>
                <p style="color: #94A3B8; margin-top: 10px;">ပညာရေးကို လူတိုင်းလက်လှမ်းမီစေရန်</p>
            </div>
        </div>

        <div id="profile-screen" class="screen">
            <div style="text-align: center; padding: 10px 0;">
                <svg id="profile-avatar" viewBox="0 0 100 100">
                    <circle cx="50" cy="25" r="10" stroke="white" stroke-width="3" fill="none" />
                    <line x1="50" y1="35" x2="50" y2="70" stroke="white" stroke-width="3" />
                    <line x1="50" y1="45" x2="30" y2="60" stroke="white" stroke-width="3" />
                    <line x1="50" y1="45" x2="70" y2="60" stroke="white" stroke-width="3" />
                    <line x1="50" y1="70" x2="35" y2="90" stroke="white" stroke-width="3" />
                    <line x1="50" y1="70" x2="65" y2="90" stroke="white" stroke-width="3" />
                    <path id="hair" d="M38,20 Q35,5 45,15 M62,20 Q65,5 55,15" stroke="white" stroke-width="2" fill="none" style="display:none;" />
                </svg>
                <h2 id="user-name" style="margin: 10px 0 5px;">User</h2>
                <p id="user-id-text" style="color: #94A3B8; margin: 0 0 15px;"></p>
                <div class="gender-container">
                    <span>ကျား</span>
                    <label class="switch">
                        <input type="checkbox" id="gender-switch" onchange="updateAvatar(true)">
                        <span class="slider"></span>
                    </label>
                    <span>မ</span>
                </div>
                <div class="profile-info-card">
                    <div style="text-align: left; font-size: 0.9rem;">
                        <b style="color: var(--accent);">ဝယ်ယူပြီးသော ဘာသာရပ်များ:</b><br>
                        <span id="bought-items" style="color: var(--white);">မရှိသေးပါ</span>
                    </div>
                    <a href="https://t.me/thearkot" target="_blank" class="btn buy-btn">ဘာသာရပ်ဝယ်ယူရန် ဆက်သွယ်ရန်</a>
                </div>
            </div>
        </div>

        <div id="menu-screen" class="screen">
            <h2 id="menu-title" style="text-align: center; color: var(--accent);">Menu</h2>
            <div id="menu-content"></div>
            <button class="btn back-btn" id="menu-back-btn">ပင်မစာမျက်နှာသို့</button>
        </div>

        <div id="activity-screen" class="screen">
            <h2 id="activity-title" style="text-align: center; color: var(--accent);">ရွေးချယ်ပါ</h2>
            <div id="activity-content"></div>
            <button class="btn back-btn" id="activity-back-btn">နောက်သို့</button>
        </div>

        <div id="quiz-screen" class="screen">
            <div style="text-align: center; margin-bottom: 20px;">
                <span id="quiz-progress" style="color: var(--accent); font-weight: bold; font-size: 1.2rem;">0 / 0</span>
            </div>
            <div id="question-box" style="font-size: 1.2rem; text-align: center; margin: 20px 0; line-height: 1.6; background: var(--card); padding: 15px; border-radius: 12px;"></div>
            <div id="quiz-options"></div>
            <button id="next-btn" class="btn next-btn" onclick="nextQuestion()">နောက်တစ်ပုဒ်သို့ ➔</button>
            <button class="btn back-btn" id="quiz-back-btn">ထွက်မည်</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item nav-active" onclick="changeTab('home', this)">🏠</div>
        <div class="nav-item" onclick="changeTab('middle', this)">❓</div>
        <div class="nav-item" onclick="changeTab('profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const paidUsers = { "8432363664": ["mm", "en", "math", "phy", "chem", "bio", "eco"] , "5593040432": ["mm", "en", "math", "phy", "chem", "bio", "eco"]};
        const subjects = [
            { id: 'mm', name: 'မြန်မာစာ' },
            { id: 'en', name: 'အင်္ဂလိပ်စာ', units: 12 },
            { id: 'math', name: 'သင်္ချာ', chapters: 11 },
            { id: 'phy', name: 'ရူပဗေဒ', chapters: 13 },
            { id: 'chem', name: 'ဓာတုဗေဒ', chapters: 8 },
            { id: 'bio', name: 'ဇီဝဗေဒ', chapters: 6 },
            { id: 'eco', name: 'ဘောဂဗေဒ', chapters: 8 }
        ];

        let currentSubject = null;
        let currentQuestions = [];
        let currentIdx = 0;
        let isAnswered = false;
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        const userBought = paidUsers[userId] || [];

        function renderSubjects() {
            const list = document.getElementById('subject-list');
            if(!list) return;
            list.innerHTML = '';
            subjects.forEach(sub => {
                const isPaid = userBought.includes('all') || userBought.includes(sub.id);
                const div = document.createElement('div');
                div.className = `subject-card ${isPaid ? '' : 'locked'}`;
                div.innerHTML = `<span>${sub.name} ${isPaid ? '' : '🔒'}</span> <span>➔</span>`;
                div.onclick = () => { if(isPaid) { currentSubject = sub; openSubjectMenu(sub); } else { tg.showAlert("ဝယ်ယူရန်လိုအပ်ပါသည်။"); } };
                list.appendChild(div);
            });
        }

        function openSubjectMenu(sub) {
            showScreen('menu');
            document.getElementById('menu-title').innerText = sub.name;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';
            document.getElementById('menu-back-btn').onclick = () => showScreen('home');

            if (sub.id === 'mm') {
                const mmTypes = [
                    { name: 'မှား/မှန်', type: 'quiz' }, { name: 'ကွက်လပ်ဖြည့်', type: 'quiz' },
                    { name: 'အမှန်ရွေး', type: 'quiz' }, { name: 'ခက်ဆစ်', type: 'flashcard' },
                    { name: 'အလင်္ကာ', type: 'flashcard' }
                ];
                mmTypes.forEach(m => createBtn(m.name, content, () => m.type === 'quiz' ? showMMQuizOptions(m.name) : showMMFlashcardOptions(m.name)));
            } else {
                const label = sub.id === 'en' ? 'Unit' : 'Chapter';
                for(let i=1; i<=(sub.units || sub.chapters); i++) {
                    createBtn(`${label} ${i}`, content, () => showGeneralActivities(sub.id, `${label} ${i}`));
                }
            }
        }

        function showMMQuizOptions(typeName) {
            showScreen('activity');
            document.getElementById('activity-title').innerText = typeName;
            const content = document.getElementById('activity-content');
            content.innerHTML = '';
            document.getElementById('activity-back-btn').onclick = () => openSubjectMenu(currentSubject);
            ['အပြော', 'အရေး', 'အဖတ်'].forEach(cat => {
                createBtn(cat, content, () => {
                    initQuiz(`mm_${cat}_${typeName}`.replace(/\//g, "_").replace(/ /g, "_"));
                    document.getElementById('quiz-back-btn').onclick = () => showMMQuizOptions(typeName);
                });
            });
        }

        function showMMFlashcardOptions(typeName) {
            showScreen('activity');
            document.getElementById('activity-title').innerText = typeName;
            const content = document.getElementById('activity-content');
            content.innerHTML = '';
            document.getElementById('activity-back-btn').onclick = () => openSubjectMenu(currentSubject);
            createBtn("စကားပြေ", content, () => showMMSubTopics(typeName, "စကားပြေ"));
            createBtn("ကဗျာ", content, () => showMMSubTopics(typeName, "ကဗျာ"));
            createBtn("ရေသည်", content, () => tg.showAlert("ရေသည်ပြဇာတ် Flashcards မကြာမီလာမည်..."));
        }

        function showMMSubTopics(typeName, category) {
            const content = document.getElementById('activity-content');
            content.innerHTML = `<h3 style="text-align:center">${category} (${typeName})</h3>`;
            document.getElementById('activity-back-btn').onclick = () => showMMFlashcardOptions(typeName);
            let topics = category === "စကားပြေ" ? 
                ["ညောင်ရမ်းကြီးသမီး", "သစ္စာနှင့်ပညာ", "ခေတ်", "မလုပ်မစား", "စာဘူးတောင်း", "ဦးဖေမောင်တင်", "အဖြူနှင့်အနက်", "စိတ်ဓာတ်ရင့်ကျက်တည်ငြိမ်ခြင်း"] :
                ["ပေါ်နွေလလျှင်", "ငါ့ကိုလွယ်အမယ်ကြီးနှင့်", "ဩဝါဒထူးပျို့", "ပေါင်းရှစ်ယောက် ကောက်စိုက်သူ", "အညာမင်္ဂလာဆောင်", "ကမ္ဗောဇသို့", "လက်ဖက်ရည်ကြမ်းဝိုင်း", "ပဒေသာလက်ရာ"];
            topics.forEach(t => createBtn(t, content, () => tg.showAlert(t + " Flashcards မကြာမီလာမည်...")));
        }

        function showGeneralActivities(subId, partName) {
            showScreen('activity');
            document.getElementById('activity-title').innerText = partName;
            const content = document.getElementById('activity-content');
            content.innerHTML = '';
            document.getElementById('activity-back-btn').onclick = () => openSubjectMenu(currentSubject);
            createBtn("Quiz", content, () => {
                content.innerHTML = `<h3 style="text-align:center">${partName} Quiz Type</h3>`;
                ['True_False', 'Fill_Blank', 'MCQ'].forEach(type => {
                    createBtn(type.replace('_',' '), content, () => {
                        initQuiz(`${subId}_${partName}_${type}`.replace(/ /g, "_"));
                        document.getElementById('quiz-back-btn').onclick = () => showGeneralActivities(subId, partName);
                    });
                });
            });
            createBtn("Flashcards", content, () => tg.showAlert("Coming Soon..."));
        }

        async function initQuiz(fileName) {
            try {
                const res = await fetch(`./quizzes/${fileName}.json`);
                currentQuestions = await res.json();
                currentIdx = 0;
                showScreen('quiz');
                loadQuestion();
            } catch (e) { tg.showAlert("မေးခွန်းဖိုင်မတွေ့သေးပါ- " + fileName + ".json"); }
        }

        function loadQuestion() {
            isAnswered = false;
            document.getElementById('next-btn').style.display = 'none';
            const q = currentQuestions[currentIdx];
            document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
            document.getElementById('question-box').innerText = q.q;
            const optDiv = document.getElementById('quiz-options');
            optDiv.innerHTML = '';

            if (q.type === 'mcq' || q.type === 'tf') {
                let options = q.type === 'tf' ? ["မှန် (TRUE)", "မှား (FALSE)"] : q.a;
                options.forEach((a, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn option-btn';
                    btn.innerText = a;
                    btn.onclick = () => {
                        if(isAnswered) return; isAnswered = true;
                        let correctIdx = q.type === 'tf' ? (q.c === true ? 0 : 1) : q.c;
                        document.querySelectorAll('.option-btn').forEach((b, idx) => {
                            if(idx === correctIdx) b.classList.add('correct-opt');
                            else if(idx === i) b.classList.add('wrong-opt');
                        });
                        document.getElementById('next-btn').style.display = 'block';
                    };
                    optDiv.appendChild(btn);
                });
            } else if (q.type === 'blank' || q.type.includes('ကွက်လပ်')) {
                const input = document.createElement('input');
                input.type = "text";
                input.className = 'quiz-input';
                input.placeholder = "အဖြေရိုက်ထည့်ပါ...";
                const sBtn = document.createElement('button');
                sBtn.className = 'btn check-btn';
                sBtn.innerText = "အဖြေစစ်မည်";
                sBtn.onclick = () => {
                    if(isAnswered) return;
                    const uAns = input.value.trim().toLowerCase();
                    const cAns = q.c.toString().toLowerCase();
                    if(uAns === cAns) { input.style.borderColor = "var(--success)"; tg.showAlert("မှန်ကန်ပါသည်။ ✅"); }
                    else { input.style.borderColor = "var(--error)"; tg.showAlert("မှားယွင်းပါသည်။ ❌ အဖြေမှန်မှာ: " + q.c); }
                    isAnswered = true; input.readOnly = true;
                    document.getElementById('next-btn').style.display = 'block';
                };
                optDiv.append(input, sBtn);
                // Input ထဲမှာ keyboard ပေါ်လာအောင် လုပ်ဆောင်ချက်
                setTimeout(() => input.focus(), 300);
            }
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < currentQuestions.length) loadQuestion();
            else { tg.showAlert("ပြီးဆုံးပါပြီ။"); document.getElementById('quiz-back-btn').click(); }
        }

        function updateAvatar(save = false) {
            const isFemale = document.getElementById('gender-switch').checked;
            document.getElementById('hair').style.display = isFemale ? 'block' : 'none';
            if(save) localStorage.setItem('userGender', isFemale ? 'female' : 'male');
        }

        function createBtn(txt, parent, act) {
            const b = document.createElement('button'); b.className = 'btn'; b.innerText = txt; b.onclick = act; parent.appendChild(b);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            const target = document.getElementById(id + '-screen');
            if(target) target.classList.add('active-screen');
        }

        function changeTab(id, el) {
            showScreen(id);
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            if(id === 'home') renderSubjects();
        }

        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Scholar";
        document.getElementById('user-id-text').innerText = "ID: " + userId;
        document.getElementById('bought-items').innerText = subjects.filter(s => userBought.includes(s.id)).map(s => s.name).join(', ');
        if(localStorage.getItem('userGender') === 'female') { document.getElementById('gender-switch').checked = true; updateAvatar(); }
        renderSubjects();
    </script>
</body>
</html>
