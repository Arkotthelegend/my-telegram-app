<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0F172A;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 10px;
            padding-bottom: 80px;
        }
        .subject-card {
            margin-bottom: 10px;
            border-radius: 15px;
            overflow: hidden;
        }
        .subject-header {
            background-color: #38BDF8;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .options {
            display: none;
            background: white;
            padding: 10px;
        }
        .opt-btn {
            background: #38BDF8;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: #1E293B;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>

    <div id="main-list">
        </div>

    <div class="nav-bar">
        <span>🏠</span>
        <span>❓</span>
        <span>👤</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const subjects = [
            "မြန်မာစာ", "အင်္ဂလိပ်စာ", "သင်္ချာ", 
            "ဓာတုဗေဒ", "ရူပဗေဒ", "ဘောဂဗေဒ", "ဇီဝဗေဒ"
        ];

        const listContainer = document.getElementById('main-list');

        subjects.forEach(subject => {
            const container = document.createElement('div');
            container.className = 'subject-card';
            container.innerHTML = `
                <div class="subject-header" onclick="toggle(this)">
                    <span>${subject}</span>
                    <span>▼</span>
                </div>
                <div class="options">
                    <button class="opt-btn">ဉာဏ်စမ်းမေးခွန်းများ</button>
                    <button class="opt-btn">Flashcards</button>
                </div>
            `;
            listContainer.appendChild(container);
        });

        function toggle(el) {
            const options = el.nextElementSibling;
            const isVisible = options.style.display === "block";
            
            // Close all others first
            document.querySelectorAll('.options').forEach(opt => opt.style.display = "none");
            
            // Toggle current
            options.style.display = isVisible ? "none" : "block";
            
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
