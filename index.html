<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; --white: #ffffff; --lock: #475569; }
        body { background-color: var(--bg); color: var(--white); font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .container { padding: 15px; height: calc(100vh - 70px); overflow-y: auto; box-sizing: border-box; }
        
        .subject-card {
            background: var(--accent); padding: 20px; border-radius: 18px;
            margin-bottom: 12px; font-size: 1.2rem; font-weight: bold;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .locked { background: var(--lock); opacity: 0.6; }
        
        .screen { display: none; }
        .active-screen { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin: 8px 0; cursor: pointer; text-decoration: none; display: block; text-align: center; }
        .back-btn { background: #334155; margin-top: 20px; }
        .buy-btn { background: #10B981; margin-top: 15px; } /* Green color for purchase */
        
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--card); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #334155; }
        .nav-item { font-size: 1.8rem; opacity: 0.4; cursor: pointer; }
        .nav-active { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div id="home-screen" class="screen active-screen">
            <h2 style="text-align: center; color: var(--accent);">ဘာသာရပ်များ</h2>
            <div id="subject-list"></div>
        </div>

        <div id="menu-screen" class="screen">
            <h2 id="menu-title" style="text-align: center; color: var(--accent);">Menu</h2>
            <div id="menu-content" style="display: grid; gap: 10px;"></div>
            <button class="btn back-btn" onclick="showScreen('home')">နောက်သို့</button>
        </div>

        <div id="profile-screen" class="screen">
            <div style="text-align: center; padding: 30px 0;">
                <div style="width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--bg);" id="avatar">?</div>
                <h1 id="user-name">User</h1>
                <p id="user-id-text" style="color: #94A3B8;"></p>
                
                <div style="background: var(--card); padding: 20px; border-radius: 15px; text-align: left; margin-top: 20px;">
                    <b>ဝယ်ယူပြီးသော ဘာသာရပ်များ:</b><br>
                    <span id="bought-items" style="color: var(--accent);">မရှိသေးပါ</span>
                    
                    <a href="https://t.me/thearkot" target="_blank" class="btn buy-btn">ဘာသာရပ်ဝယ်ယူရန်</a>
                </div>
            </div>
        </div>

        <div id="middle-screen" class="screen">
             <div style="height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center;">
                <h2 style="color: var(--accent);">အာကုတ်မှပြုလုပ်ထားသည်</h2>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item nav-active" onclick="changeTab('home', this)">🏠</div>
        <div class="nav-item" onclick="changeTab('middle', this)">❓</div>
        <div class="nav-item" onclick="changeTab('profile', this)">👤</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const paidUsers = {
            "8432363664": ["mm", "en", "phy", "chem"]
        };

        const subjects = [
            { id: 'mm', name: 'မြန်မာစာ', parts: ['အပြော', 'စကားပြေ', 'ကဗျာ', 'ရေသည်', 'အဖတ်'] },
            { id: 'en', name: 'အင်္ဂလိပ်စာ', units: 12, poems: 4 },
            { id: 'phy', name: 'ရူပဗေဒ', chapters: 13 },
            { id: 'chem', name: 'ဓာတုဗေဒ', chapters: 8 },
            { id: 'eco', name: 'ဘောဂဗေဒ', chapters: 8 },
            { id: 'bio', name: 'ဇီဝဗေဒ', chapters: 6 }
        ];

        const userId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        const userBought = paidUsers[userId] || [];

        function renderSubjects() {
            const listDiv = document.getElementById('subject-list');
            listDiv.innerHTML = '';
            subjects.forEach(sub => {
                const isPaid = userBought.includes('all') || userBought.includes(sub.id);
                const div = document.createElement('div');
                div.className = `subject-card ${isPaid ? '' : 'locked'}`;
                div.innerHTML = `<span>${sub.name} ${isPaid ? '' : '🔒'}</span> <span>➔</span>`;
                div.onclick = () => {
                    if (isPaid) openSubject(sub);
                    else tg.showAlert("ဤဘာသာရပ်ကို ဝယ်ယူရန် လိုအပ်ပါသည်။ Profile tab ရှိ 'ဘာသာရပ်ဝယ်ယူရန်' ခလုတ်မှတစ်ဆင့် ဆက်သွယ်နိုင်ပါသည်။");
                };
                listDiv.appendChild(div);
            });
        }

        function openSubject(sub) {
            showScreen('menu');
            document.getElementById('menu-title').innerText = sub.name;
            const content = document.getElementById('menu-content');
            content.innerHTML = '';
            
            if (sub.id === 'mm') {
                sub.parts.forEach(p => createBtn(p, content, () => showActivities('mm', p)));
            } else if (sub.id === 'en') {
                for(let i=1; i<=sub.units; i++) createBtn(`Unit ${i}`, content, () => showActivities('en', `Unit ${i}`));
                for(let i=1; i<=sub.poems; i++) createBtn(`Poem ${i}`, content, () => showActivities('en', `Poem ${i}`));
            } else {
                for(let i=1; i<=sub.chapters; i++) createBtn(`Chapter ${i}`, content, () => showActivities(sub.id, `Chapter ${i}`));
            }
        }

        function showActivities(type, title) {
            const content = document.getElementById('menu-content');
            document.getElementById('menu-title').innerText = title;
            content.innerHTML = `<h3 style="text-align:center">လေ့ကျင့်ခန်းရွေးပါ</h3>`;
            createBtn("Quiz", content, () => showQuizTypes(type));
            createBtn("Flashcards", content, () => showFlashcardOptions(type));
        }

        function showQuizTypes(type) {
            const content = document.getElementById('menu-content');
            content.innerHTML = `<h3 style="text-align:center">Quiz ပုံစံရွေးပါ</h3>`;
            
            if (type === 'mm') {
                createBtn("မှား/မှန်", content, () => tg.showAlert("မြန်မာစာ မှား/မှန် လာပါတော့မည်"));
                createBtn("ကွက်လပ်ဖြည့်", content, () => tg.showAlert("မြန်မာစာ ကွက်လပ်ဖြည့် လာပါတော့မည်"));
                createBtn("အမှန်ရွေး", content, () => tg.showAlert("မြန်မာစာ အမှန်ရွေး လာပါတော့မည်"));
            } else if (type === 'en') {
                createBtn("Initial Letter", content, () => tg.showAlert("English Initial Letter Coming Soon"));
                createBtn("MCQ", content, () => tg.showAlert("English MCQ Coming Soon"));
                createBtn("Grammar", content, () => tg.showAlert("English Grammar Coming Soon"));
            } else {
                createBtn("True or False", content, () => tg.showAlert("True or False Coming Soon"));
                createBtn("Fill in the Blank", content, () => tg.showAlert("Fill in the Blank Coming Soon"));
                createBtn("MCQ", content, () => tg.showAlert("MCQ Coming Soon"));
            }
        }

        function showFlashcardOptions(type) {
            const content = document.getElementById('menu-content');
            if (type === 'phy') {
                content.innerHTML = `<h3 style="text-align:center">ရူပဗေဒ Flashcards</h3>`;
                createBtn("Definition", content, () => tg.showAlert("Physics Definition Cards"));
                createBtn("Derivation", content, () => tg.showAlert("Physics Derivation Cards"));
            } else {
                tg.showAlert("Flashcards Section Coming Soon");
            }
        }

        function createBtn(text, parent, action) {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = text;
            b.onclick = action;
            parent.appendChild(b);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id + '-screen').classList.add('active-screen');
        }

        function changeTab(id, el) {
            showScreen(id);
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
            el.classList.add('nav-active');
            if(id === 'home') renderSubjects(); 
        }

        // Init
        renderSubjects();
        const fName = tg.initDataUnsafe?.user?.first_name || "Scholar";
        document.getElementById('user-name').innerText = fName;
        document.getElementById('avatar').innerText = fName.charAt(0);
        document.getElementById('user-id-text').innerText = "ID: " + userId;
        
        if (userBought.length > 0) {
            const names = subjects.filter(s => userBought.includes(s.id)).map(s => s.name).join(', ');
            document.getElementById('bought-items').innerText = names;
        }
    </script>
</body>
</html>
