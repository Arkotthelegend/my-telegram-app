<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0F172A;
            --btn-blue: #38BDF8;
            --card-dark: #1E293B;
            --text-main: #F8FAFC;
            --text-dim: #94A3B8;
            --lock-color: #334155;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            margin: 0; padding: 0; overflow: hidden;
        }

        /* Views Switching */
        .view-section {
            display: none; height: calc(100vh - 70px);
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Subjects & Pop-up Animation */
        .subject-container { margin-bottom: 12px; border-radius: 18px; overflow: hidden; }
        
        .subject-header {
            background-color: var(--btn-blue); color: white;
            padding: 18px 25px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; font-size: 1.2rem; font-weight: bold;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
        }
        
        .subject-header:active { transform: scale(0.94); } /* Pop-up scale effect */

        .options-drawer {
            max-height: 0; overflow: hidden; background: #ffffff05;
            transition: max-height 0.4s ease-out;
        }
        .options-drawer.open { max-height: 200px; padding: 10px; }

        .opt-btn {
            background: var(--btn-blue); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 12px;
            margin: 5px 0; font-weight: bold; font-size: 1rem;
            transition: transform 0.1s;
        }
        .opt-btn:active { transform: scale(0.96); }

        /* Locked State UI */
        .locked { background-color: var(--lock-color) !important; opacity: 0.6; }

        /* Profile Style */
        .profile-container { text-align: center; padding-top: 40px; }
        .profile-pic {
            width: 120px; height: 120px; background: white;
            border-radius: 50%; margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .profile-pic svg { width: 80px; fill: var(--bg-dark); }
        .profile-name { font-size: 2rem; font-weight: bold; margin-bottom: 30px; }
        
        .profile-action-btn {
            background: #1E293B; color: white; border: 1px solid #334155;
            width: 90%; padding: 18px; border-radius: 15px;
            margin: 8px auto; font-size: 1.1rem; font-weight: 500;
            display: block; text-decoration: none;
            transition: transform 0.1s;
        }
        .profile-action-btn:active { transform: scale(0.97); }

        /* Bottom Navigation */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--card-dark); display: flex; border-top: 1px solid #334155;
        }
        .tab-item {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .tab-item.active { background: #ffffff05; border-bottom: 3px solid var(--btn-blue); }

        .middle-msg {
            height: 100%; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem; color: var(--text-dim);
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="learn-view" class="view-section active">
        <div id="subjects-list"></div>
    </div>

    <div id="middle-view" class="view-section">
        <div class="middle-msg">အာကုတ်မှပြုလုပ်ထားသည်</div>
    </div>

    <div id="profile-view" class="view-section">
        <div class="profile-container">
            <div class="profile-pic">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="profile-name" id="user-name">Scholar</div>
            <div class="profile-action-btn" id="purchased-count">0 ဘာသာဝယ်ယူပြီး</div>
            <a href="https://t.me/thearkot" target="_blank" class="profile-action-btn" style="background: #2481cc; border:none;">ဘာသာဝယ်ယူရန်</a>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('learn', this)">🏠</div>
        <div class="tab-item" onclick="switchTab('middle', this)">❓</div>
        <div class="tab-item" onclick="switchTab('profile', this)">👤</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // --- ADMIN DATABASE SECTION ---
        // အသုံးပြုသူရဲ့ ID နဲ့ သူဝယ်ထားတဲ့ ဘာသာရပ်တွေကို ဒီမှာစာရင်းသွင်းပါ
        const userDatabase = {
            "123456789": ["မြန်မာစာ", "အင်္ဂလိပ်စာ"], // Example User 1
            "8432363664": ["မြန်မာစာ", "အင်္ဂလိပ်စာ", "သင်္ချာ", "ဓာတုဗေဒ", "ရူပဗေဒ"] // စမ်းသပ်ရန် သင့် ID ကို ဒီမှာထည့်ပါ
        };

        const currentUserId = tg.initDataUnsafe?.user?.id?.toString() || "guest";
        const purchasedSubjects = userDatabase[currentUserId] || [];
        const allSubjects = ["မြန်မာစာ", "အင်္ဂလိပ်စာ", "သင်္ချာ", "ဓာတုဗေဒ", "ရူပဗေဒ", "ဘောဂဗေဒ", "ဇီဝဗေဒ"];

        // Render Subject List
        const listContainer = document.getElementById('subjects-list');
        allSubjects.forEach(sub => {
            const isPurchased = purchasedSubjects.includes(sub);
            const container = document.createElement('div');
            container.className = 'subject-container';
            
            container.innerHTML = `
                <div class="subject-header ${!isPurchased ? 'locked' : ''}" onclick="toggleSub(this, ${isPurchased})">
                    <span>${sub} ${!isPurchased ? '🔒' : ''}</span>
                    <span>▼</span>
                </div>
                <div class="options-drawer">
                    <button class="opt-btn" onclick="openAction('Quiz', '${sub}')">Quiz</button>
                    <button class="opt-btn" onclick="openAction('Flashcards', '${sub}')">Flashcards</button>
                </div>
            `;
            listContainer.appendChild(container);
        });

        // Update Profile
        document.getElementById('user-name').innerText = tg.initDataUnsafe?.user?.first_name || "Scholar";
        document.getElementById('purchased-count').innerText = `${purchasedSubjects.length} ဘာသာဝယ်ယူပြီး`;

        // Logic Functions
        function toggleSub(el, isPurchased) {
            if (!isPurchased) {
                tg.showPopup({
                    title: 'Access Locked',
                    message: 'ဒီဘာသာရပ်ကို လေ့လာရန် @thearkot ဆီမှာ ဝယ်ယူပေးပါခင်ဗျာ။',
                    buttons: [{text: 'OK', type: 'close'}]
                });
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                return;
            }
            const drawer = el.nextElementSibling;
            drawer.classList.toggle('open');
            el.querySelector('span:last-child').innerText = drawer.classList.contains('open') ? '▲' : '▼';
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function openAction(type, sub) {
            tg.showAlert(`${sub} ဘာသာရပ်ရဲ့ ${type} အပိုင်းကို မကြာမီ တင်ပေးတော့မှာဖြစ်ပါတယ်!`);
        }

        function switchTab(viewId, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }
    </script>
</body>
</html>
